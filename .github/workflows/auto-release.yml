name: Auto-release on manifest bump

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/petlibro/manifest.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read manifest version
        id: manifest
        run: |
          version=$(jq -r .version custom_components/petlibro/manifest.json)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag
        env:
          TAG: ${{ steps.manifest.outputs.tag }}
        run: |
          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG already exists — nothing to release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.manifest.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            --target "$SHA"
