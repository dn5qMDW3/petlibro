name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build and attach release asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Update manifest version
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' custom_components/petlibro/manifest.json > tmp.json
          mv tmp.json custom_components/petlibro/manifest.json

      - name: Create release zip
        run: |
          cd custom_components
          zip -r ../petlibro.zip petlibro/

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: petlibro.zip
